default: &default
  poll_due_listings:
    class: PollDueListingsJob
    schedule: every minute
  dispatch_mail_deliveries:
    class: DispatchMailDeliveriesJob
    schedule: every minute
  discover_catalogs:
    class: DiscoverCatalogsJob
    schedule: every day at 1am Asia/Seoul
  discover_searches:
    class: DiscoverSearchesJob
    schedule: every day at 2am Asia/Seoul
  cleanup_delivery_logs:
    class: CleanupDeliveryLogsJob
    schedule: every day at 3am Asia/Seoul
  clear_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

development:
  <<: *default

production:
  <<: *default
