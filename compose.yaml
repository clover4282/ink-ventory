services:
  web:
    build:
      context: .
    command: ./bin/rails server -b 0.0.0.0
    env_file: .env
    environment:
      RAILS_ENV: development
      SOLID_QUEUE_IN_PUMA: "1"
      APP_HOST: ${APP_HOST:-localhost}
      APP_PORT: ${APP_PORT:-3300}
    ports:
      - "${APP_PORT:-3300}:3000"
    volumes:
      - .:/rails
      - sqlite_data:/rails/storage
    tty: true
    stdin_open: true

volumes:
  sqlite_data:
